name: ourfitness
description: A fitness tracking app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  shared_preferences: ^2.3.3
  fl_chart: ^1.2.0
  provider: ^6.1.5+1
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  intl: ^0.19.0
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Assets (add if you have local images/icons):
  assets:
    - assets/images/
    - assets/videos/
  #   - assets/icons/